plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace 'com.mapzone.speedalert'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34

        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    api files('libs/mapzone-speed-alert-sdk-0.0.6.aar')
}

publishing {
    publications {
        release(MavenPublication) {
            groupId = 'com.github.mapzone-global'
            artifactId = 'mapzone-speed-alert-android'
            version = '0.0.6'
            
            artifact("$buildDir/outputs/aar/speedalert-release.aar")
        }
    }
}
